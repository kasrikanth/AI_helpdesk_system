version: "3.9"

services:
  backend:
    build:
      context: ./ESI_AI_Helpdesk_Backend
    container_name: esi-backend
    ports:
      - "8000:8000"
    env_file:
      - ./ESI_AI_Helpdesk_Backend/.env

  frontend:
    build:
      context: ./ESI_AI_Helpdesk_Frontend
    container_name: esi-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend